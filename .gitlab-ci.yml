image: node:20-alpine

variables:
  JWT_SECRET: "ci-test-secret-minimum-32-characters-ok"

ci:
  script:
    # Instala solo las dependencias necesarias para los tests unitarios (~150MB vs ~1GB full)
    # Next.js, AWS SDK y MongoDB no se necesitan — los tests son funciones puras
    - npm install --no-save
        jest ts-jest jest-environment-node @types/jest
        typescript ts-node
        jsonwebtoken @types/jsonwebtoken
        bcryptjs @types/bcryptjs
        mongodb
    - npm test
  only:
    - main
    - merge_requests
